  human_review_required: true
  review_checklist:
    - "标题2是否最优？还是标题1更贴近Marcus的焦虑？"
    - "第三章的文化编码部分是否过深？Marcus受众是否需要更多铺垫？"
    - "第四章的可纠正性论证是否足够落地？还是太抽象？"
    - "⚠️ 人工补充点：第三章需要创作者亲身经历"
