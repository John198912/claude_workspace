outline:
  topic_id: "create-20260608-ai-recursive-self-human-value"
  title: "当AI开始建造自己：你的不可替代性，不在技能库里"
  method: "RIVET"
  total_sections: 6
  estimated_length: "2800-3500字"

  structure:

    - section: 0
      title: "钩子（0-100字）"
      purpose: "3句内打破默认假设，制造认知冲突"
      content_plan: |
        用数据堆叠制造冲击感：80%代码是AI写的、57.5%互联网流量不是人、连写《协同智能》的教授都改口了——这不是科幻，这是上周发生的五件事。
        然后突然反转：但拐点真正指向的，不是你该学什么技能——而是一个更根本的问题。

    - section: 1
      title: "R——Rupture（打破默认假设）"
      subtitle: "「同一周五件事：AI自我进化的五重证据」"
      purpose: "打破读者'AI自我进化还是科幻'的默认假设"
      length: "500-600字"
      content_plan: |
        按五层框架展开上周的信号收敛：
        - 第一层（事实）：Anthropic 80%代码+OpenAI GPT-5.3自创+DeepMind AlphaEvolve
        - 第二层（基础设施）：Cloudflare机器流量57.5%首超人类
        - 第三层（叙事）：Mollick宣布协同智能终结
        - 第四层（意义）：Dwarkesh追问AGI后什么仍然稀缺
        - 第五层（治理）：Anthropic一边加速一边呼吁暂停
        关键论点：这不是五篇独立文章，是同一场对话的五层展开。时间线收敛在同一周不是巧合。
      evidence_sources:
        - "Anthropic Institute 官方博客 (2026-06-04)"
        - "OpenAI 联邦治理提案 (2026-06-05)"
        - "Cloudflare Radar (2026-06-05)"
        - "Ethan Mollick One Useful Thing (2026-06-05)"
        - "Dwarkesh Patel Podcast (2026-06-04)"

    - section: 2
      title: "I——Illuminate（照亮深层结构）"
      subtitle: "「拐点到了吗？四个诚实的回答」"
      purpose: "揭示读者看不到的深层结构——不是简单的'到了'或'没到'，而是分层判断"
      length: "500-600字"
      content_plan: |
        用四层回答替代二元判断：
        - 能力层：🟡自动化加速，自主化未到（目标判断力'仍有巨大差距'）
        - 基础设施层：🔴拐点已到（机器流量57.5%首超人类=互联网本质改变）
        - 叙事层：🔴拐点已到（Mollick放弃协同智能框架）
        - 经济层：⚪数据不足以判断（Dwarkesh嘉宾坦诚：我们没有数据）

        照亮盲区：
        ① AI从「工具」变成「守门人」——你的内容先被AI读，才可能被人看到
        ② 技能折旧速度超过学习速度——但这不是绝望的理由
        ③ 真正的问题不是「AI能做什么」而是「人还在乎什么是人做的」

        引入反方观点平衡：Gary Marcus说这只是更好的代码助手；复杂性刹车理论认为三个必要条件无一完全达成。诚实面对质疑。
      evidence_sources:
        - "Anthropic五维数据+五环框架"
        - "Gary Marcus批评文章"
        - "Dwarkesh'数据真空'论述"

    - section: 3
      title: "V——Validate（验证处境与论点）"
      subtitle: "「你不是在杞人忧天——但你害怕的东西可能不对」"
      purpose: "验证读者焦虑的合理性，同时重新定义问题——从供给侧焦虑转向需求侧思考"
      length: "450-550字"
      content_plan: |
        命名焦虑的五重冲击：
        - 「只要学会用AI我就有价值」→AI自己就能进步，你学什么？
        - 「AI是我的协作者」→连最乐观的教育者都改口了
        - 「我的内容直接到达读者」→57.5%概率先被AI审核
        - 「经济会找到新工作」→理论上可能，但我们没有数据确认
        - 「这是科幻」→学术界已有可复现的RSI技术框架

        重新锚定核心论点：
        这不是「供给侧」的问题（AI能做什么）——这是「需求侧」的问题（人类在乎什么）。
        Dwarkesh嘉宾的实验数据：即使内容完全相同，「人做」vs「AI做」的知觉就能改变估值。
        Imas的关键表述：「人们似乎有一种内在价值——不仅仅是稀缺——而是对共情、连接、与其他人类互动的内在偏好。」

        SOUL控制性理念在此刻被五路信号极端验证：
        「在AI重塑一切的时代，真实稳定的自我是唯一不可被替代的资产。」
        不可被替代，不是「AI做不到」——而是「人类在乎是人类做的」。
      evidence_sources:
        - "Dwarkesh Podcast: Imas实验数据"
        - "SOUL控制性理念"
        - "Cloudflare流量拐点数据"

    - section: 4
      title: "E——Embody（具身化为故事和隐喻）"
      subtitle: "「海平面与不会沉的房子」"
      purpose: "把抽象论证转化为可感知的隐喻和具体案例，让读者在情感层面'感觉到'论点"
      length: "400-500字"
      content_plan: |
        核心隐喻：
        「AI不是对手——它是你身后不断上升的海平面。你不需要游得比海快，你需要找到不会沉的东西。」

        展开隐喻的三层意思：
        ① 海平面上升是不可阻挡的——技能自动化就像潮水，今天淹没编程，明天淹没研究，后天可能淹没更多
        ② 但有些东西天然浮在水上——你的具体经历、你的真实判断、你对另一个人类的共情——这些东西的浮力来自人类的内在偏好，不是来自技术壁垒
        ③ 「不会沉的房子」不是一次建成的——它是在日常选择中积累的：每次都选择做「你做才有价值」的事，而不是「AI也能做但你更快」的事

        用Mollick的具体案例具身化：
        他写书时自己写每一章初稿——「你想读我的书是因为你想知道我这个人类作者的想法」。但他用AI审阅、用AI核实事实、用AI解困。他的选择不是「用不用AI」，而是「在哪里保留人类的核心」。
        他甚至刻意减少破折号——因为上一本书有128个em-dash——「拼命想证明文本是人类写的」。这是2026年创作者的真实处境：你不是在和AI竞赛，你是在和读者心中那个'这可能是AI写的'的怀疑竞赛。

    - section: 5
      title: "T——Transform（给出下一步行动）"
      subtitle: "「今晚可以做的三件事」"
      purpose: "把洞察转化为ZPD内的具体行动，不给宏大人生改造方案，只给今晚可以开始的最小一步"
      length: "400-500字"
      content_plan: |
        行动一：「两栏清单」
        把你现在做的工作分成两栏——左边是「AI做了就贬值」，右边是「我做才有价值」。
        左边那栏不是要你放弃，而是要你意识到：这些是工具，不是身份。
        右边那栏才是你的护城河。如果右边是空的——别慌，大多数人都是。但你需要开始填。

        行动二：「愿意多付钱测试」
        在右边那栏的每件事旁边，加一个问题：「如果是我做的，有人愿意多付钱吗？」
        这不是让你涨价。这是让你理解经济学上的「关系性部门」——人类参与本身就是产品价值的一部分。如果你现在的答案是「没有」——问自己：我做哪件事，会让答案变成「有」？

        行动三：「找到你的第一块砖」
        Mollick的核心洞察不是AI变强了——而是AI正在成为信息的中介层。这意味着：你的内容能不能到达人，取决于它能不能先通过AI。但反过来也意味着：当大多数内容都是AI生成的，一个真实人类的声音会变得异常刺眼——像沙漠里的一杯水。
        找到一件「只有你能写/做/说」的事——不是因为你技能最强，而是因为那是你的经历、你的视角、你的判断。把它写下来。今晚。不用完美。

        结尾回扣：
        「AI能写80%的代码了。问题不是你能写什么——问题是你决定写什么。」
        拐点到了吗？能力层面还没有。但叙事层面和基础设施层面，已经到了。
        你不需要害怕AI写代码。你需要害怕的是：你还在练习写代码，而没有练习决定写什么。

    - section: 6
      title: "收尾金句"
      purpose: "用一个可传播的、有记忆点的句子收束全文"
      content: "「一个机器人明年变成很多机器人，但芭蕾舞者的数量不变。」—— 不是因为你造不出会跳舞的机器，而是因为人来看芭蕾，看的是另一个人类在重力下的挣扎。"
